{% extends "base.html" %}

{% block content %}
    <div class="card" style="max-width: 500px; margin: 3rem auto;">
        <h2 style="text-align: center; margin-bottom: 2rem;">Login</h2>
        
        {% if error %}
            <div class="alert alert-error">
                {{ error }}
            </div>
        {% endif %}
        
        <form method="post" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" required />
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" required />
            </div>
            
            <button type="submit" class="btn" style="width: 100%;">Login</button>
        </form>
        
        <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid #eee;">
            <h4>Demo Credentials</h4>
            <p><strong>Admin:</strong> username: <code>admin</code>, password: <code>admin123</code></p>
            <p><strong>Store Owner:</strong> username: <code>store1</code>, password: <code>store123</code></p>
        </div>
    </div>
{% endblock %}
